<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing For Jalyn</title>
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Writing For Jalyn">
  <meta property="og:description" content="a little something for you 💌">
  <meta property="og:image" content="preview.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="preview.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #fdf0eb 0%, #fce8f0 50%, #f9e4e8 100%);
      font-family: 'Caveat', cursive;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(255, 200, 200, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255, 180, 210, 0.12) 0%, transparent 50%);
      pointer-events: none;
    }

    .scene {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 3rem 1.5rem;
    }

    .hearts-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      pointer-events: none;
    }

    .envelope-wrap {
      position: relative;
      width: 340px;
      max-width: 92vw;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      z-index: 10;
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .envelope-wrap.hidden {
      opacity: 0;
      transform: scale(0.93);
      pointer-events: none;
    }

    .env-svg { width: 100%; display: block; }

    .seal-wrap {
      position: absolute;
      top: calc(50% + 25px);
      left: 50%;
      transform: translate(-50%, -50%);
      width: 48px;
      height: 48px;
      animation: sealPulse 2.4s ease-in-out infinite;
    }

    .seal {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #b84a5a, #8b2535 60%, #6b1a27);
      box-shadow:
        0 0 0 3px #8b2535,
        0 0 0 4.5px #c4607080,
        inset 0 2px 4px rgba(255,180,180,0.18),
        inset 0 -2px 4px rgba(0,0,0,0.25),
        2px 3px 8px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      clip-path: polygon(
        50% 0%, 56% 2%, 62% 0%, 68% 3%, 74% 1%, 79% 5%,
        84% 4%, 88% 8%, 92% 8%, 95% 13%, 98% 15%, 99% 21%,
        100% 26%, 99% 32%, 100% 38%, 98% 43%, 100% 49%,
        98% 55%, 99% 61%, 97% 66%, 99% 72%, 96% 77%,
        94% 82%, 90% 85%, 87% 90%, 82% 92%, 77% 95%,
        72% 97%, 66% 99%, 60% 100%, 54% 99%, 48% 100%,
        42% 98%, 36% 100%, 30% 97%, 25% 99%, 19% 96%,
        14% 93%, 10% 89%, 6% 86%, 3% 81%, 1% 76%,
        0% 70%, 1% 64%, 0% 58%, 2% 52%, 0% 46%,
        1% 40%, 0% 34%, 2% 28%, 0% 22%, 3% 17%,
        6% 12%, 10% 8%, 14% 5%, 19% 3%, 24% 1%,
        30% 0%, 36% 2%, 42% 0%, 48% 2%
      );
    }

    .seal-initials {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 15px;
      color: #7a1f2e;
      letter-spacing: 0.05em;
      text-shadow:
        0 1px 1px rgba(255, 180, 170, 0.35),
        0 -1px 1px rgba(0, 0, 0, 0.45);
      pointer-events: none;
      user-select: none;
    }

    @keyframes sealPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50%       { transform: translate(-50%, -50%) scale(1.07); }
    }

    .hint {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: #c4967a;
      margin-top: 1.6rem;
      letter-spacing: 0.06em;
      z-index: 10;
      transition: opacity 0.4s ease;
      opacity: 0;
      animation: fadeUp 0.6s 0.5s ease forwards;
    }

    .hint.hidden {
      opacity: 0 !important;
      pointer-events: none;
    }

    .note-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      z-index: 20;
      transition: opacity 0.5s ease;
      padding: 1.5rem;
    }

    .note-wrap.visible {
      pointer-events: auto;
      opacity: 1;
    }

    .note-wrap.drifting {
      animation: driftUp 0.85s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes driftUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .note {
      background: #fffef5;
      padding: 2.2rem 2.4rem 2rem;
      width: 100%;
      max-width: 360px;
      position: relative;
      cursor: pointer;
      box-shadow: 2px 4px 12px rgba(0,0,0,0.12);
    }

    .note-body {
      word-wrap: break-word;
      overflow-wrap: break-word;
      flex: 1;
    }

    .note-content { position: relative; z-index: 1; }

    .note-date {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 13px;
      color: #c4967a;
      text-align: right;
      margin-bottom: 0.9rem;
    }

    .note-dear {
      font-family: 'Caveat', cursive;
      font-size: 26px;
      color: #8b4c3a;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .note-body {
      font-family: 'Caveat', cursive;
      font-size: 21px;
      color: #5c3828;
      line-height: 1.85;
      margin-bottom: 1.2rem;

      /* ✏️  YOUR NOTE GOES HERE — update this whenever you want to send her something new */
    }

    .note-sign {
      font-family: 'Caveat', cursive;
      font-size: 23px;
      color: #8b4c3a;
      font-weight: 600;
      text-align: right;
    }

    .note-tap-hint {
      margin-top: 1.6rem;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 11px;
      color: #d4b090;
      text-align: center;
      letter-spacing: 0.04em;
    }

    .note-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.6rem;
    }

    .save-btn {
      background: #c4967a;
      border: none;
      border-radius: 20px;
      padding: 4px 14px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 13px;
      color: #fffef5;
      cursor: pointer;
      letter-spacing: 0.04em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="hearts-canvas" id="heartsCanvas"></div>

  <div class="scene">
    <div class="envelope-wrap" id="envWrap" onclick="openEnvelope()">
      <img src="envelope.png" class="env-svg" alt="envelope" />

      <div class="seal-wrap">
        <div class="seal">
          <span class="seal-initials">SJ</span>
        </div>
      </div>
    </div>

    <div class="hint" id="hint">tap to open ♡</div>
  </div>

  <div class="note-wrap" id="noteWrap" onclick="closeNote()">
    <div class="note-container">
    <div class="note">
<div class="note-content">
        <div class="note-date" id="noteDate"></div>
        <div class="note-dear">little owl,</div>
        <div class="note-body">
          <!-- ✏️  YOUR NOTE GOES HERE — change this text whenever you want to send her something new -->
          you push me to be a better person. i'm so lucky to be a part of your life. 🌷
        </div>
        <div class="note-sign">— sarah jane</div>
      </div>
      <div class="note-tap-hint">tap to close</div>
    </div>
    <button class="save-btn" onclick="event.stopPropagation(); saveNote()">save note</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    const months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    const d = new Date();
    document.getElementById('noteDate').textContent =
      `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;

    let busy = false;

    function openEnvelope() {
      if (busy) return;
      busy = true;
      document.getElementById('envWrap').classList.add('hidden');
      document.getElementById('hint').classList.add('hidden');
      const nw = document.getElementById('noteWrap');
      nw.classList.add('drifting');
      nw.addEventListener('animationend', () => {
        nw.classList.remove('drifting');
        nw.classList.add('visible');
        busy = false;
      }, { once: true });
    }

    function saveNote() {
      const note = document.querySelector('.note');
      html2canvas(note, { useCORS: true, scale: 2 }).then(canvas => {
        const link = document.createElement('a');
        const d = new Date();
        link.download = `note-${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }

    function closeNote() {
      if (busy) return;
      busy = true;
      const nw = document.getElementById('noteWrap');
      nw.classList.remove('visible');
      setTimeout(() => {
        document.getElementById('envWrap').classList.remove('hidden');
        document.getElementById('hint').classList.remove('hidden');
        busy = false;
      }, 520);
    }

    const canvas = document.getElementById('heartsCanvas');
    const colors = ['#f5b8c8','#f9c8d4','#f0a8b8','#fcd0dc','#e8a0b4','#f4c0cc'];

    const hearts = [];
    for (let i = 0; i < 55; i++) {
      const el = document.createElement('div');
      el.className = 'heart';
      el.textContent = '♥';
      el.style.fontSize = `${7 + Math.random() * 11}px`;
      el.style.color = colors[Math.floor(Math.random() * colors.length)];
      canvas.appendChild(el);
      hearts.push({
        el,
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight, // scatter on load
        speed: 0.6 + Math.random() * 1.2,
        delay: Math.random() * 8000,
        born: false,
      });
    }

    let lastTime = null;
    function animate(ts) {
      if (!lastTime) lastTime = ts;
      const dt = Math.min(ts - lastTime, 50);
      lastTime = ts;

      const vw = window.innerWidth;
      const vh = window.innerHeight;

      for (const h of hearts) {
        if (!h.born) {
          if (ts < h.delay) continue;
          h.born = true;
        }

        h.y += h.speed * (dt / 16);

        // wrap horizontally
        if (h.x < -20) h.x = vw + 20;
        if (h.x > vw + 20) h.x = -20;

        // reset when off bottom
        if (h.y > vh + 30) {
          h.y = -20;
          h.x = Math.random() * vw;
          h.speed = 0.6 + Math.random() * 1.2;
        }

        // fade in near top, fade out near bottom
        const p = h.y / vh;
        let opacity = 0;
        if (p < 0.08) opacity = (p / 0.08) * 0.5;
        else if (p < 0.85) opacity = 0.5 - ((p - 0.08) / 0.77) * 0.25;
        else opacity = Math.max(0, (1 - p) / 0.15 * 0.25);

        h.el.style.transform = `translate(${h.x}px, ${h.y}px)`;
        h.el.style.opacity = opacity;
      }

      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  </script>
</body>
</html>
