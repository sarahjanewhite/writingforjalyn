<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing For Jalyn</title>
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Writing For Jalyn">
  <meta property="og:description" content="a little something for you 💌">
  <meta property="og:image" content="preview.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="preview.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="hearts-canvas" id="heartsCanvas"></div>

  <div class="scene">
    <div class="envelope-wrap" id="envWrap" onclick="openEnvelope()">
      <img src="envelope.png" class="env-svg" alt="envelope" />
      <div class="envelope-to">to my love</div>
      <div class="seal-wrap">
        <div class="seal">
          <span class="seal-initials">SJ</span>
        </div>
      </div>
    </div>
    <div class="hint" id="hint">tap to open ♡</div>
  </div>

  <div class="note-wrap" id="noteWrap" onclick="closeNote()">
    <div class="note-container">
      <div class="note-stack">
        <div class="note-behind note-behind-2" id="noteBehind2"></div>
        <div class="note-behind note-behind-1" id="noteBehind1"></div>
        <div class="note" id="mainNote" onclick="event.stopPropagation()">
          <div class="note-content">
            <div class="note-date" id="noteDate"></div>
            <div class="note-dear">little owl,</div>
            <div class="note-body" id="noteBody"></div>
            <div class="note-sign">— sarah jane</div>
          </div>
          <div class="note-nav" id="noteNav">
            <button class="note-nav-btn" id="prevBtn" onclick="event.stopPropagation(); changeNote(-1)">←</button>
            <span class="note-nav-counter" id="noteCounter"></span>
            <button class="note-nav-btn" id="nextBtn" onclick="event.stopPropagation(); changeNote(1)">→</button>
          </div>
          <div class="note-tap-hint">tap outside to close</div>
        </div>
      </div>
      <div class="note-actions">
        <button class="save-btn" onclick="event.stopPropagation(); saveNote()">save note</button>
        <button class="reply-btn" onclick="event.stopPropagation(); replyToNote()">reply to sj</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
