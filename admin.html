<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>admin // writingforjalyn</title>
  <link rel="apple-touch-icon" href="adminicon.png">
  <link rel="icon" type="image/png" href="adminicon.png">
  <meta name="apple-mobile-web-app-title" content="WFJ Admin">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="application-name" content="WFJ Admin">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #ffb000;
      --dimamber: #b37a00;
      --darkamber: #3b2800;
      --bg: #0a0800;
    }

    body {
      background: var(--bg);
      color: var(--amber);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      min-height: 100vh;
      padding: 1.5rem;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px
      );
    }

    .titlebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1rem;
      margin-bottom: 1.2rem;
      border-bottom: 1px solid var(--darkamber);
      font-size: 12px;
      color: var(--dimamber);
      letter-spacing: 0.1em;
    }

    .titlebar-title { color: var(--amber); }

    .blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 560px;
      margin: 0 auto;
    }

    .panel {
      border: 1px solid var(--darkamber);
      box-shadow: 0 0 8px rgba(255,176,0,0.08);
      padding: 1.2rem 1.4rem;
    }

    .panel-header {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dimamber);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--darkamber);
    }

    .panel-header::before { content: '// '; color: var(--amber); }

    /* stats */
    .stats { display: flex; gap: 2rem; }
    .stat-label { font-size: 10px; letter-spacing: 0.15em; color: var(--dimamber); text-transform: uppercase; margin-bottom: 0.3rem; }
    .stat-value { font-size: 22px; color: var(--amber); }

    /* form */
    label { display: block; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--dimamber); margin-bottom: 0.4rem; }
    label::before { content: '> '; color: var(--amber); }

    input, textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--darkamber);
      color: var(--amber);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 15px;
      padding: 8px 0;
      outline: none;
      margin-bottom: 1.4rem;
      caret-color: var(--amber);
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus { border-bottom-color: var(--amber); }
    input::placeholder, textarea::placeholder { color: var(--darkamber); }
    input[type="password"] { letter-spacing: 0.2em; }

    textarea {
      resize: vertical;
      min-height: 100px;
      line-height: 1.7;
      border: 1px solid var(--darkamber);
      padding: 8px;
    }
    textarea:focus { border-color: var(--amber); }

    .submit-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--amber);
      color: var(--amber);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      box-shadow: 0 0 6px rgba(255,176,0,0.15);
    }
    .submit-btn:hover:not(:disabled) { background: var(--amber); color: var(--bg); }
    .submit-btn:disabled { opacity: 0.35; cursor: default; }

    .status { margin-top: 0.8rem; font-size: 11px; letter-spacing: 0.08em; min-height: 16px; }
    .status::before { content: '// '; }
    .status.success { color: var(--amber); }
    .status.error   { color: #ff4444; }
    .status.pending { color: var(--dimamber); }

    /* transmissions */
    .transmission {
      padding: 0.7rem 0;
      border-bottom: 1px solid var(--darkamber);
    }
    .transmission:last-child { border-bottom: none; }

    .transmission-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }

    .transmission-text { flex: 1; }

    .transmission-date { font-size: 10px; color: var(--dimamber); letter-spacing: 0.1em; margin-bottom: 0.3rem; }
    .transmission-body { font-size: 13px; color: var(--amber); line-height: 1.5; }

    .note-controls {
      display: flex;
      gap: 0.4rem;
      flex-shrink: 0;
      align-items: flex-start;
    }

    .menu-btn, .menu-action {
      background: none;
      border: none;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 11px;
      padding: 0;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: color 0.15s;
    }

    .menu-btn { color: var(--dimamber); }
    .menu-btn:hover { color: var(--amber); }

    .menu-action { display: none; color: var(--amber); }
    .menu-action.visible { display: inline; }
    .menu-action.do-delete:hover { color: #ff4444; }

    .menu-sep { color: var(--darkamber); font-size: 11px; display: none; }
    .menu-sep.visible { display: inline; }

    .edit-textarea {
      width: 100%;
      background: transparent;
      border: 1px solid var(--dimamber);
      color: var(--amber);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 13px;
      padding: 6px;
      outline: none;
      resize: vertical;
      min-height: 70px;
      line-height: 1.6;
      caret-color: var(--amber);
      margin-top: 0.4rem;
    }
    .edit-textarea:focus { border-color: var(--amber); }

    .edit-actions { display: flex; gap: 0.5rem; margin-top: 0.4rem; }
    .edit-save, .edit-cancel {
      background: none;
      border: 1px solid var(--darkamber);
      color: var(--dimamber);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 11px;
      padding: 3px 10px;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: border-color 0.15s, color 0.15s;
    }
    .edit-save:hover   { border-color: var(--amber); color: var(--amber); }
    .edit-cancel:hover { border-color: #ff4444; color: #ff4444; }

    .empty { color: var(--dimamber); font-size: 12px; }
  </style>
</head>
<body>

  <div class="titlebar">
    <span>admin_console</span>
    <span class="titlebar-title" id="clock"><span class="blink">_</span></span>
  </div>

  <div class="grid">

    <div class="panel">
      <div class="panel-header">system stats</div>
      <div class="stats">
        <div>
          <div class="stat-label">notes on file</div>
          <div class="stat-value" id="noteCount">—</div>
        </div>
        <div>
          <div class="stat-label">latest</div>
          <div class="stat-value" id="latestDate">—</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">transmit new note</div>
      <label>github token</label>
      <input type="password" id="token" placeholder="ghp_..." autocomplete="off" />
      <label>message body</label>
      <textarea id="body" placeholder="write something..."></textarea>
      <button class="submit-btn" id="submitBtn" onclick="submitNote()">[ transmit ]</button>
      <div class="status" id="status"></div>
    </div>

    <div class="panel">
      <div class="panel-header">recent transmissions</div>
      <div id="recentList"><span class="empty">loading...</span></div>
    </div>

  </div>

  <script>
    const REPO = 'sarahjanewhite/writingforjalyn';
    const FILE = 'notes.json';
    const API  = `https://api.github.com/repos/${REPO}/contents/${FILE}`;

    const tokenEl = document.getElementById('token');
    tokenEl.value = localStorage.getItem('sj_gh_token') || '';

    // live clock
    function updateClock() {
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      document.getElementById('clock').textContent =
        `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── single source of truth ──
    let cachedNotes = [];

    function updateStats() {
      document.getElementById('noteCount').textContent = cachedNotes.length;
      document.getElementById('latestDate').textContent = cachedNotes[0]?.date.split(',')[0] || '—';
    }

    function renderNotes() {
      const list = document.getElementById('recentList');
      list.innerHTML = '';
      if (!cachedNotes.length) {
        list.innerHTML = '<span class="empty">no notes yet</span>';
        return;
      }
      cachedNotes.forEach((n, i) => {
        const div = document.createElement('div');
        div.className = 'transmission';
        div.id = `note-${i}`;
        div.innerHTML = `
          <div class="transmission-row">
            <div class="transmission-text">
              <div class="transmission-date">${n.date}</div>
              <div class="transmission-body" id="body-${i}">${n.body}</div>
            </div>
            <div class="note-controls" id="controls-${i}">
              <button class="menu-btn" id="menu-btn-${i}" onclick="toggleMenu(${i})">[ ... ]</button>
              <span class="menu-sep" id="sep-${i}">|</span>
              <button class="menu-action do-edit"   id="edit-action-${i}"   onclick="startEdit(${i})">edit</button>
              <span class="menu-sep" id="sep2-${i}">|</span>
              <button class="menu-action do-delete" id="delete-action-${i}" onclick="deleteNote(${i})">delete</button>
            </div>
          </div>
        `;
        list.appendChild(div);
      });
    }

    function toggleMenu(i) {
      const isOpen = document.getElementById(`edit-action-${i}`).classList.contains('visible');
      // close all
      document.querySelectorAll('.menu-action').forEach(el => el.classList.remove('visible'));
      document.querySelectorAll('.menu-sep').forEach(el => el.classList.remove('visible'));
      document.querySelectorAll('.menu-btn').forEach(el => { el.textContent = '[ ... ]'; });
      // open this one if it wasn't already open
      if (!isOpen) {
        document.getElementById(`edit-action-${i}`).classList.add('visible');
        document.getElementById(`delete-action-${i}`).classList.add('visible');
        document.getElementById(`sep-${i}`).classList.add('visible');
        document.getElementById(`sep2-${i}`).classList.add('visible');
        document.getElementById(`menu-btn-${i}`).textContent = '[ x ]';
      }
    }

    // ── load from GitHub ──
    async function loadNotes() {
      try {
        const token = tokenEl.value.trim();
        const headers = token
          ? { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' }
          : { Accept: 'application/vnd.github+json' };
        const res = await fetch(API, { headers });
        if (!res.ok) throw new Error();
        const { content } = await res.json();
        cachedNotes = JSON.parse(decodeURIComponent(escape(atob(content.replace(/\n/g, '')))));
        updateStats();
        renderNotes();
      } catch {
        document.getElementById('recentList').innerHTML = '<span class="empty">could not load notes</span>';
      }
    }

    loadNotes();

    // ── commit helper ──
    async function commitNotes(message) {
      const token = tokenEl.value.trim();
      const res = await fetch(API, {
        headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' }
      });
      if (!res.ok) throw new Error('fetch failed — check token');
      const { sha } = await res.json();
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(cachedNotes, null, 2) + '\n')));
      const put = await fetch(API, {
        method: 'PUT',
        headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, content: encoded, sha })
      });
      if (!put.ok) throw new Error('commit failed — check token permissions');
    }

    // ── transmit ──
    function getDate() {
      const months = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
      const d = new Date();
      return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
    }

    async function submitNote() {
      const token = tokenEl.value.trim();
      const body  = document.getElementById('body').value.trim();
      const btn   = document.getElementById('submitBtn');
      if (!token) return setStatus('no token provided', 'error');
      if (!body)  return setStatus('message body is empty', 'error');

      localStorage.setItem('sj_gh_token', token);
      btn.disabled = true;
      setStatus('transmitting...', 'pending');
      try {
        cachedNotes.unshift({ date: getDate(), body });
        updateStats();
        renderNotes();
        document.getElementById('body').value = '';
        setStatus('transmission successful', 'success');
        await commitNotes(`add note — ${getDate()}`);
      } catch (e) {
        cachedNotes.shift(); // rollback
        updateStats();
        renderNotes();
        setStatus(e.message, 'error');
      } finally {
        btn.disabled = false;
      }
    }

    // ── delete ──
    async function deleteNote(i) {
      if (!confirm('delete this note?')) return;
      const removed = cachedNotes.splice(i, 1)[0];
      updateStats();
      renderNotes();
      setStatus('deleting...', 'pending');
      try {
        await commitNotes(`delete note — ${getDate()}`);
        setStatus('note deleted', 'success');
      } catch (e) {
        cachedNotes.splice(i, 0, removed); // rollback
        updateStats();
        renderNotes();
        setStatus(e.message, 'error');
      }
    }

    // ── edit ──
    function startEdit(i) {
      toggleMenu(i); // close the menu
      const bodyEl = document.getElementById(`body-${i}`);
      const original = cachedNotes[i].body;
      bodyEl.innerHTML = `
        <textarea class="edit-textarea" id="edit-input-${i}">${original}</textarea>
        <div class="edit-actions">
          <button class="edit-save"   onclick="saveEdit(${i})">[ save ]</button>
          <button class="edit-cancel" onclick="renderNotes()">[ cancel ]</button>
        </div>
      `;
      document.getElementById(`edit-input-${i}`).focus();
    }

    async function saveEdit(i) {
      const newBody = document.getElementById(`edit-input-${i}`)?.value.trim();
      if (!newBody) return setStatus('note body is empty', 'error');
      const old = cachedNotes[i].body;
      cachedNotes[i].body = newBody;
      renderNotes();
      setStatus('saving...', 'pending');
      try {
        await commitNotes(`edit note — ${getDate()}`);
        setStatus('note updated', 'success');
      } catch (e) {
        cachedNotes[i].body = old; // rollback
        renderNotes();
        setStatus(e.message, 'error');
      }
    }

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = `status ${type}`;
    }
  </script>
</body>
</html>
