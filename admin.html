<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>admin // writingforjalyn</title>
  <link rel="apple-touch-icon" href="adminicon.png">
  <link rel="icon" type="image/png" href="adminicon.png">
  <meta name="apple-mobile-web-app-title" content="WFJ Admin">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="application-name" content="WFJ Admin">
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <div class="titlebar">
    <span>admin_console</span>
    <span class="titlebar-title" id="clock"><span class="blink">_</span></span>
  </div>

  <div class="grid">

    <div class="panel">
      <div class="panel-header">system stats</div>
      <div class="stats">
        <div>
          <div class="stat-label">notes on file</div>
          <div class="stat-value" id="noteCount">—</div>
        </div>
        <div>
          <div class="stat-label">latest</div>
          <div class="stat-value" id="latestDate">—</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">transmit new note</div>
      <label>github token</label>
      <input type="password" id="token" placeholder="ghp_..." autocomplete="off" />
      <label>message body</label>
      <textarea id="body" placeholder="write something..."></textarea>
      <label>photo (optional)</label>
      <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImagePick(this)" />
      <div class="image-pick-row">
        <button type="button" class="image-pick-btn" id="imagePickBtn" onclick="document.getElementById('imageInput').click()">[ attach photo ]</button>
        <span class="image-pick-name" id="imagePickName"></span>
      </div>
      <button class="submit-btn" id="submitBtn" onclick="submitNote()">[ transmit ]</button>
      <div class="status" id="status"></div>
    </div>

    <div class="panel">
      <div class="panel-header">recent transmissions</div>
      <div id="recentList"><span class="empty">loading...</span></div>
    </div>

  </div>

  <script>
    const REPO = 'sarahjanewhite/writingforjalyn';
    const FILE = 'notes.json';
    const API  = `https://api.github.com/repos/${REPO}/contents/${FILE}`;

    const tokenEl = document.getElementById('token');
    tokenEl.value = localStorage.getItem('sj_gh_token') || '';

    // live clock
    function updateClock() {
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      document.getElementById('clock').textContent =
        `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── single source of truth ──
    let cachedNotes = [];

    function updateStats() {
      document.getElementById('noteCount').textContent = cachedNotes.length;
      document.getElementById('latestDate').textContent = cachedNotes[0]?.date.split(',')[0] || '—';
    }

    function renderNotes() {
      const list = document.getElementById('recentList');
      list.innerHTML = '';
      if (!cachedNotes.length) {
        list.innerHTML = '<span class="empty">no notes yet</span>';
        return;
      }
      cachedNotes.forEach((n, i) => {
        const div = document.createElement('div');
        div.className = 'transmission';
        div.id = `note-${i}`;
        div.innerHTML = `
          <div class="transmission-row">
            <div class="transmission-text">
              <div class="transmission-date">${n.date}</div>
              ${n.image ? `<img class="thumb" src="${n.image}" alt="" />` : ''}
              <div class="transmission-body" id="body-${i}">${n.body}</div>
            </div>
            <div class="note-controls" id="controls-${i}">
              <button class="menu-btn" id="menu-btn-${i}" onclick="toggleMenu(${i})">[ ... ]</button>
              <div class="dropdown" id="dropdown-${i}">
                <button class="menu-action do-edit"   onclick="startEdit(${i})">edit</button>
                <button class="menu-action do-delete" onclick="deleteNote(${i})">delete</button>
              </div>
            </div>
          </div>
        `;
        list.appendChild(div);
      });
    }

    function toggleMenu(i) {
      const dropdown = document.getElementById(`dropdown-${i}`);
      const isOpen = dropdown.classList.contains('open');
      // close all
      document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
      document.querySelectorAll('.menu-btn').forEach(b => b.textContent = '[ ... ]');
      // open this one if it wasn't already
      if (!isOpen) {
        dropdown.classList.add('open');
        document.getElementById(`menu-btn-${i}`).textContent = '[ x ]';
      }
    }

    // close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.note-controls')) {
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
        document.querySelectorAll('.menu-btn').forEach(b => b.textContent = '[ ... ]');
      }
    });

    // ── load from GitHub ──
    async function loadNotes() {
      try {
        const token = tokenEl.value.trim();
        const headers = token
          ? { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' }
          : { Accept: 'application/vnd.github+json' };
        const res = await fetch(API, { headers });
        if (!res.ok) throw new Error();
        const { content } = await res.json();
        cachedNotes = JSON.parse(decodeURIComponent(escape(atob(content.replace(/\n/g, '')))));
        updateStats();
        renderNotes();
      } catch {
        document.getElementById('recentList').innerHTML = '<span class="empty">could not load notes</span>';
      }
    }

    loadNotes();

    // ── commit helper ──
    async function commitNotes(message) {
      const token = tokenEl.value.trim();
      const res = await fetch(API, {
        headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' }
      });
      if (!res.ok) throw new Error('fetch failed — check token');
      const { sha } = await res.json();
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(cachedNotes, null, 2) + '\n')));
      const put = await fetch(API, {
        method: 'PUT',
        headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, content: encoded, sha })
      });
      if (!put.ok) throw new Error('commit failed — check token permissions');
    }

    // ── image upload ──
    let pendingImageFile = null;

    function handleImagePick(input) {
      const file = input.files[0];
      if (!file) return;
      pendingImageFile = file;
      document.getElementById('imagePickName').textContent = file.name;
      document.getElementById('imagePickBtn').classList.add('picked');
    }

    async function uploadImage(file) {
      const form = new FormData();
      form.append('file', file);
      form.append('upload_preset', 'writingforjalyn');
      const res = await fetch('https://api.cloudinary.com/v1_1/dtggzaknr/image/upload', {
        method: 'POST',
        body: form
      });
      if (!res.ok) throw new Error('image upload failed');
      const data = await res.json();
      return data.secure_url;
    }

    function clearImagePicker() {
      pendingImageFile = null;
      document.getElementById('imageInput').value = '';
      document.getElementById('imagePickName').textContent = '';
      document.getElementById('imagePickBtn').classList.remove('picked');
    }

    // ── transmit ──
    function getDate() {
      const months = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
      const d = new Date();
      return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
    }

    async function submitNote() {
      const token = tokenEl.value.trim();
      const body  = document.getElementById('body').value.trim();
      const btn   = document.getElementById('submitBtn');
      if (!token) return setStatus('no token provided', 'error');
      if (!body && !pendingImageFile) return setStatus('message body is empty', 'error');

      localStorage.setItem('sj_gh_token', token);
      btn.disabled = true;
      let noteAdded = false;
      try {
        let imageUrl = null;
        if (pendingImageFile) {
          setStatus('uploading image...', 'pending');
          imageUrl = await uploadImage(pendingImageFile);
        }
        setStatus('transmitting...', 'pending');
        const note = { date: getDate(), body };
        if (imageUrl) note.image = imageUrl;
        cachedNotes.unshift(note);
        noteAdded = true;
        updateStats();
        renderNotes();
        document.getElementById('body').value = '';
        clearImagePicker();
        await commitNotes(`add note — ${getDate()}`);
        setStatus('transmission successful', 'success');
      } catch (e) {
        if (noteAdded) { cachedNotes.shift(); updateStats(); renderNotes(); }
        setStatus(e.message, 'error');
      } finally {
        btn.disabled = false;
      }
    }

    // ── delete ──
    async function deleteNote(i) {
      if (!confirm('delete this note?')) return;
      const removed = cachedNotes.splice(i, 1)[0];
      updateStats();
      renderNotes();
      setStatus('deleting...', 'pending');
      try {
        await commitNotes(`delete note — ${getDate()}`);
        setStatus('note deleted', 'success');
      } catch (e) {
        cachedNotes.splice(i, 0, removed); // rollback
        updateStats();
        renderNotes();
        setStatus(e.message, 'error');
      }
    }

    // ── edit ──
    function startEdit(i) {
      toggleMenu(i); // close the menu
      const bodyEl = document.getElementById(`body-${i}`);
      const original = cachedNotes[i].body;
      bodyEl.innerHTML = `
        <textarea class="edit-textarea" id="edit-input-${i}">${original}</textarea>
        <div class="edit-actions">
          <button class="edit-save"   onclick="saveEdit(${i})">[ save ]</button>
          <button class="edit-cancel" onclick="renderNotes()">[ cancel ]</button>
        </div>
      `;
      document.getElementById(`edit-input-${i}`).focus();
    }

    async function saveEdit(i) {
      const newBody = document.getElementById(`edit-input-${i}`)?.value.trim();
      if (!newBody) return setStatus('note body is empty', 'error');
      const old = cachedNotes[i].body;
      cachedNotes[i].body = newBody;
      renderNotes();
      setStatus('saving...', 'pending');
      try {
        await commitNotes(`edit note — ${getDate()}`);
        setStatus('note updated', 'success');
      } catch (e) {
        cachedNotes[i].body = old; // rollback
        renderNotes();
        setStatus(e.message, 'error');
      }
    }

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = `status ${type}`;
    }
  </script>
</body>
</html>
