<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>admin // writingforjalyn</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #ffb000;
      --dimgreen: #b37a00;
      --darkgreen: #3b2800;
      --bg: #0a0800;
    }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      /* scanlines */
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.15) 2px,
        rgba(0, 0, 0, 0.15) 4px
      );
    }

    .terminal {
      width: 100%;
      max-width: 560px;
      border: 1px solid var(--dimgreen);
      box-shadow:
        0 0 8px rgba(0, 255, 65, 0.3),
        inset 0 0 40px rgba(0, 255, 65, 0.03);
      padding: 2rem;
    }

    .titlebar {
      border-bottom: 1px solid var(--dimgreen);
      padding-bottom: 0.8rem;
      margin-bottom: 1.6rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--dimgreen);
      letter-spacing: 0.1em;
    }

    .titlebar-title { color: var(--green); font-size: 13px; }

    h1 {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      color: var(--dimgreen);
    }

    h1 span { color: var(--green); }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dimgreen);
      margin-bottom: 0.5rem;
    }

    label::before { content: '> '; color: var(--green); }

    input, textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--darkgreen);
      color: var(--green);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 15px;
      padding: 8px 0;
      outline: none;
      margin-bottom: 1.8rem;
      caret-color: var(--green);
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus {
      border-bottom-color: var(--green);
    }

    input::placeholder, textarea::placeholder {
      color: var(--darkgreen);
    }

    input[type="password"] { letter-spacing: 0.2em; }

    textarea {
      resize: vertical;
      min-height: 110px;
      line-height: 1.7;
      border: 1px solid var(--darkgreen);
      padding: 8px;
    }

    textarea:focus { border-color: var(--green); }

    .submit-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      box-shadow: 0 0 6px rgba(0, 255, 65, 0.2);
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--green);
      color: var(--bg);
    }

    .submit-btn:disabled { opacity: 0.35; cursor: default; }

    .status {
      margin-top: 1rem;
      font-size: 12px;
      letter-spacing: 0.08em;
      min-height: 18px;
    }

    .status::before { content: '// '; }
    .status.success { color: var(--green); }
    .status.error   { color: #ff4444; }
    .status.pending { color: var(--dimgreen); }

    .blink {
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="terminal">
    <div class="titlebar">
      <span>admin_console</span>
      <span class="titlebar-title">writingforjalyn<span class="blink">_</span></span>
    </div>

    <h1>// <span>transmit new note</span></h1>

    <label>github token</label>
    <input type="password" id="token" placeholder="ghp_..." autocomplete="off" />

    <label>message body</label>
    <textarea id="body" placeholder="write something..."></textarea>

    <button class="submit-btn" id="submitBtn" onclick="submitNote()">[ transmit ]</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    const REPO = 'sarahjanewhite/writingforjalyn';
    const FILE = 'notes.json';
    const API  = `https://api.github.com/repos/${REPO}/contents/${FILE}`;

    const tokenEl = document.getElementById('token');
    tokenEl.value = localStorage.getItem('sj_gh_token') || '';

    function getDate() {
      const months = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
      const d = new Date();
      return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
    }

    async function submitNote() {
      const token = tokenEl.value.trim();
      const body  = document.getElementById('body').value.trim();
      const btn   = document.getElementById('submitBtn');

      if (!token) return setStatus('no token provided', 'error');
      if (!body)  return setStatus('message body is empty', 'error');

      localStorage.setItem('sj_gh_token', token);
      btn.disabled = true;
      setStatus('transmitting...', 'pending');

      try {
        const res = await fetch(API, {
          headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' }
        });
        if (!res.ok) throw new Error('fetch failed — check token');
        const { sha, content } = await res.json();

        const current = JSON.parse(decodeURIComponent(escape(atob(content.replace(/\n/g, '')))));
        const updated = [{ date: getDate(), body }, ...current];
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(updated, null, 2) + '\n')));

        const put = await fetch(API, {
          method: 'PUT',
          headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: `add note — ${getDate()}`, content: encoded, sha })
        });
        if (!put.ok) throw new Error('commit failed — check token permissions');

        document.getElementById('body').value = '';
        setStatus('transmission successful', 'success');
      } catch (e) {
        setStatus(e.message, 'error');
      } finally {
        btn.disabled = false;
      }
    }

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = `status ${type}`;
    }
  </script>
</body>
</html>
