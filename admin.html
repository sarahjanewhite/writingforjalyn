<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>admin // writingforjalyn</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #ffb000;
      --dimamber: #b37a00;
      --darkamber: #3b2800;
      --bg: #0a0800;
    }

    body {
      background: var(--bg);
      color: var(--amber);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      min-height: 100vh;
      padding: 1.5rem;
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.15) 2px,
        rgba(0, 0, 0, 0.15) 4px
      );
    }

    .titlebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1rem;
      margin-bottom: 1.2rem;
      border-bottom: 1px solid var(--darkamber);
      font-size: 12px;
      color: var(--dimamber);
      letter-spacing: 0.1em;
    }

    .titlebar-title { color: var(--amber); }

    .blink {
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 560px;
      margin: 0 auto;
    }

    .panel {
      border: 1px solid var(--darkamber);
      box-shadow: 0 0 8px rgba(255, 176, 0, 0.08);
      padding: 1.2rem 1.4rem;
    }

    .panel-header {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dimamber);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--darkamber);
    }

    .panel-header::before { content: '// '; color: var(--amber); }

    /* ── stats ── */
    .stats {
      display: flex;
      gap: 2rem;
    }

    .stat-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--dimamber);
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .stat-value {
      font-size: 22px;
      color: var(--amber);
    }

    /* ── transmit form ── */
    label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dimamber);
      margin-bottom: 0.4rem;
    }

    label::before { content: '> '; color: var(--amber); }

    input, textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--darkamber);
      color: var(--amber);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 15px;
      padding: 8px 0;
      outline: none;
      margin-bottom: 1.4rem;
      caret-color: var(--amber);
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus { border-bottom-color: var(--amber); }
    input::placeholder, textarea::placeholder { color: var(--darkamber); }
    input[type="password"] { letter-spacing: 0.2em; }

    textarea {
      resize: vertical;
      min-height: 100px;
      line-height: 1.7;
      border: 1px solid var(--darkamber);
      padding: 8px;
      margin-bottom: 1.4rem;
    }

    textarea:focus { border-color: var(--amber); }

    .submit-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--amber);
      color: var(--amber);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      box-shadow: 0 0 6px rgba(255, 176, 0, 0.15);
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--amber);
      color: var(--bg);
    }

    .submit-btn:disabled { opacity: 0.35; cursor: default; }

    .status {
      margin-top: 0.8rem;
      font-size: 11px;
      letter-spacing: 0.08em;
      min-height: 16px;
    }

    .status::before { content: '// '; }
    .status.success { color: var(--amber); }
    .status.error   { color: #ff4444; }
    .status.pending { color: var(--dimamber); }

    /* ── recent transmissions ── */
    .transmission {
      padding: 0.7rem 0;
      border-bottom: 1px solid var(--darkamber);
    }

    .transmission:last-child { border-bottom: none; }

    .transmission-date {
      font-size: 10px;
      color: var(--dimamber);
      letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
    }

    .transmission-body {
      font-size: 13px;
      color: var(--amber);
      line-height: 1.5;
    }

    .empty { color: var(--dimamber); font-size: 12px; }
  </style>
</head>
<body>

  <div class="titlebar">
    <span>admin_console</span>
    <span class="titlebar-title" id="clock"><span class="blink">_</span></span>
  </div>

  <div class="grid">

    <!-- stats -->
    <div class="panel">
      <div class="panel-header">system stats</div>
      <div class="stats">
        <div>
          <div class="stat-label">notes on file</div>
          <div class="stat-value" id="noteCount">—</div>
        </div>
        <div>
          <div class="stat-label">latest</div>
          <div class="stat-value" id="latestDate">—</div>
        </div>
      </div>
    </div>

    <!-- transmit -->
    <div class="panel">
      <div class="panel-header">transmit new note</div>

      <label>github token</label>
      <input type="password" id="token" placeholder="ghp_..." autocomplete="off" />

      <label>message body</label>
      <textarea id="body" placeholder="write something..."></textarea>

      <button class="submit-btn" id="submitBtn" onclick="submitNote()">[ transmit ]</button>
      <div class="status" id="status"></div>
    </div>

    <!-- recent transmissions -->
    <div class="panel">
      <div class="panel-header">recent transmissions</div>
      <div id="recentList"><span class="empty">loading...</span></div>
    </div>

  </div>

  <script>
    const REPO = 'sarahjanewhite/writingforjalyn';
    const FILE = 'notes.json';
    const API  = `https://api.github.com/repos/${REPO}/contents/${FILE}`;

    // restore token
    const tokenEl = document.getElementById('token');
    tokenEl.value = localStorage.getItem('sj_gh_token') || '';

    // live clock
    function updateClock() {
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      document.getElementById('clock').textContent =
        `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // load notes for stats + recent
    async function loadNotes() {
      try {
        const res = await fetch(`https://raw.githubusercontent.com/${REPO}/main/${FILE}?t=${Date.now()}`);
        const notes = await res.json();

        document.getElementById('noteCount').textContent = notes.length;
        document.getElementById('latestDate').textContent = notes[0]?.date.split(',')[0] || '—';

        const list = document.getElementById('recentList');
        list.innerHTML = '';
        notes.slice(0, 3).forEach(n => {
          const div = document.createElement('div');
          div.className = 'transmission';
          div.innerHTML = `
            <div class="transmission-date">${n.date}</div>
            <div class="transmission-body">${n.body}</div>
          `;
          list.appendChild(div);
        });
      } catch {
        document.getElementById('recentList').innerHTML = '<span class="empty">could not load notes</span>';
      }
    }

    loadNotes();

    function getDate() {
      const months = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
      const d = new Date();
      return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
    }

    async function submitNote() {
      const token = tokenEl.value.trim();
      const body  = document.getElementById('body').value.trim();
      const btn   = document.getElementById('submitBtn');

      if (!token) return setStatus('no token provided', 'error');
      if (!body)  return setStatus('message body is empty', 'error');

      localStorage.setItem('sj_gh_token', token);
      btn.disabled = true;
      setStatus('transmitting...', 'pending');

      try {
        const res = await fetch(API, {
          headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' }
        });
        if (!res.ok) throw new Error('fetch failed — check token');
        const { sha, content } = await res.json();

        const current = JSON.parse(decodeURIComponent(escape(atob(content.replace(/\n/g, '')))));
        const updated = [{ date: getDate(), body }, ...current];
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(updated, null, 2) + '\n')));

        const put = await fetch(API, {
          method: 'PUT',
          headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: `add note — ${getDate()}`, content: encoded, sha })
        });
        if (!put.ok) throw new Error('commit failed — check token permissions');

        document.getElementById('body').value = '';
        setStatus('transmission successful', 'success');
        setTimeout(loadNotes, 3000);
      } catch (e) {
        setStatus(e.message, 'error');
      } finally {
        btn.disabled = false;
      }
    }

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = `status ${type}`;
    }
  </script>
</body>
</html>
