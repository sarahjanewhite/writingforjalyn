<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>admin portal | writingforjalyn</title>
  <link rel="apple-touch-icon" href="adminicon.png">
  <link rel="icon" type="image/png" href="adminicon.png">
  <meta name="apple-mobile-web-app-title" content="WFJ Admin">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="application-name" content="WFJ Admin">
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <canvas id="starCanvas"></canvas>

  <div class="titlebar">
    <div class="titlebar-left">
      <span class="titlebar-callsign">WFJ // UPLINK CONTROL</span>
      <span class="titlebar-sub">MISSION OPERATIONS CENTER &nbsp;◈&nbsp; ACTIVE</span>
    </div>
    <div class="titlebar-right">
      <span class="titlebar-clock" id="clock"><span class="blink">_</span></span>
      <span class="titlebar-utc">MET / LOCAL</span>
    </div>
  </div>

  <div class="grid">

    <div class="panel">
      <div class="panel-header">telemetry <span class="panel-status nominal"></span></div>
      <div class="stats">
        <div>
          <div class="stat-label">uplinks logged</div>
          <div class="stat-value" id="noteCount">—</div>
          <div class="stat-unit">TRANSMISSIONS</div>
        </div>
        <div>
          <div class="stat-label">last uplink</div>
          <div class="stat-value" id="latestDate">—</div>
          <div class="stat-unit">DATE</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">uplink composer</div>
      <label>auth token</label>
      <input type="password" id="token" placeholder="ghp_..." autocomplete="off" />
      <label>payload</label>
      <textarea id="body" placeholder="compose transmission..."></textarea>
      <label>visual payload (optional)</label>
      <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImagePick(this)" />
      <div class="image-pick-row">
        <button type="button" class="image-pick-btn" id="imagePickBtn" onclick="document.getElementById('imageInput').click()">[ attach photo ]</button>
        <span class="image-pick-name" id="imagePickName"></span>
      </div>
      <label>audio uplink (optional)</label>
      <input type="url" id="musicInput" placeholder="https://music.apple.com/..." autocomplete="off" />
      <button class="submit-btn" id="submitBtn" onclick="submitNote()">[ uplink ]</button>
      <div class="status" id="status"></div>
    </div>

    <div class="panel">
      <div class="panel-header">uplink log</div>
      <div id="recentList"><span class="empty">loading...</span></div>
    </div>

  </div>

  <script>
    const REPO = 'sarahjanewhite/writingforjalyn';
    const FILE = 'notes.json';
    const API  = `https://api.github.com/repos/${REPO}/contents/${FILE}`;

    const tokenEl = document.getElementById('token');
    tokenEl.value = localStorage.getItem('sj_gh_token') || '';

    // live clock
    function updateClock() {
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      document.getElementById('clock').textContent =
        `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── single source of truth ──
    let cachedNotes = [];

    function updateStats() {
      document.getElementById('noteCount').textContent = cachedNotes.length;
      document.getElementById('latestDate').textContent = cachedNotes[0]?.date.split(',')[0] || '—';
    }

    function renderNotes() {
      const list = document.getElementById('recentList');
      list.innerHTML = '';
      if (!cachedNotes.length) {
        list.innerHTML = '<span class="empty">no notes yet</span>';
        return;
      }
      cachedNotes.forEach((n, i) => {
        const div = document.createElement('div');
        div.className = 'transmission';
        div.id = `note-${i}`;
        div.innerHTML = `
          <div class="transmission-row">
            <div class="transmission-text">
              <div class="transmission-date">${n.date}</div>
              ${n.image ? `<img class="thumb" src="${n.image}" alt="" />` : ''}
              <div class="transmission-body" id="body-${i}">${n.body}</div>
            </div>
            <div class="note-controls" id="controls-${i}">
              <button class="menu-btn" id="menu-btn-${i}" onclick="toggleMenu(${i})">[ ... ]</button>
              <div class="dropdown" id="dropdown-${i}">
                <button class="menu-action do-edit"   onclick="startEdit(${i})">edit</button>
                <button class="menu-action do-delete" onclick="deleteNote(${i})">delete</button>
              </div>
            </div>
          </div>
        `;
        list.appendChild(div);
      });
    }

    function toggleMenu(i) {
      const dropdown = document.getElementById(`dropdown-${i}`);
      const isOpen = dropdown.classList.contains('open');
      // close all
      document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
      document.querySelectorAll('.menu-btn').forEach(b => b.textContent = '[ ... ]');
      // open this one if it wasn't already
      if (!isOpen) {
        dropdown.classList.add('open');
        document.getElementById(`menu-btn-${i}`).textContent = '[ x ]';
      }
    }

    // close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.note-controls')) {
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
        document.querySelectorAll('.menu-btn').forEach(b => b.textContent = '[ ... ]');
      }
    });

    // ── load from GitHub ──
    async function loadNotes() {
      try {
        const token = tokenEl.value.trim();
        const headers = token
          ? { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' }
          : { Accept: 'application/vnd.github+json' };
        const res = await fetch(API, { headers });
        if (!res.ok) throw new Error();
        const { content } = await res.json();
        cachedNotes = JSON.parse(decodeURIComponent(escape(atob(content.replace(/\n/g, '')))));
        updateStats();
        renderNotes();
      } catch {
        document.getElementById('recentList').innerHTML = '<span class="empty">could not load notes</span>';
      }
    }

    loadNotes();

    // ── commit helper ──
    async function commitNotes(message) {
      const token = tokenEl.value.trim();
      const res = await fetch(API, {
        headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' }
      });
      if (!res.ok) throw new Error('fetch failed — check token');
      const { sha } = await res.json();
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(cachedNotes, null, 2) + '\n')));
      const put = await fetch(API, {
        method: 'PUT',
        headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, content: encoded, sha })
      });
      if (!put.ok) throw new Error('commit failed — check token permissions');
    }

    // ── image upload ──
    let pendingImageFile = null;

    function handleImagePick(input) {
      const file = input.files[0];
      if (!file) return;
      pendingImageFile = file;
      document.getElementById('imagePickName').textContent = file.name;
      document.getElementById('imagePickBtn').classList.add('picked');
    }

    async function uploadImage(file) {
      const form = new FormData();
      form.append('file', file);
      form.append('upload_preset', 'writingforjalyn');
      const res = await fetch('https://api.cloudinary.com/v1_1/dtggzaknr/image/upload', {
        method: 'POST',
        body: form
      });
      if (!res.ok) throw new Error('image upload failed');
      const data = await res.json();
      return data.secure_url;
    }

    function clearImagePicker() {
      pendingImageFile = null;
      document.getElementById('imageInput').value = '';
      document.getElementById('imagePickName').textContent = '';
      document.getElementById('imagePickBtn').classList.remove('picked');
    }

    // ── apple music ──
    function toAppleMusicEmbed(url) {
      try {
        const u = new URL(url);
        if (!u.hostname.includes('music.apple.com')) return null;
        u.hostname = 'embed.music.apple.com';
        return u.toString();
      } catch { return null; }
    }

    // ── transmit ──
    function getDate() {
      const months = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
      const d = new Date();
      return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
    }

    async function submitNote() {
      const token = tokenEl.value.trim();
      const body  = document.getElementById('body').value.trim();
      const btn   = document.getElementById('submitBtn');
      const musicRaw = document.getElementById('musicInput').value.trim();
      const musicEmbed = musicRaw ? toAppleMusicEmbed(musicRaw) : null;
      if (musicRaw && !musicEmbed) return setStatus('invalid apple music link', 'error');
      if (!token) return setStatus('no token provided', 'error');
      if (!body && !pendingImageFile && !musicEmbed) return setStatus('message body is empty', 'error');

      localStorage.setItem('sj_gh_token', token);
      btn.disabled = true;
      let noteAdded = false;
      try {
        let imageUrl = null;
        if (pendingImageFile) {
          setStatus('uploading visual payload...', 'pending');
          imageUrl = await uploadImage(pendingImageFile);
        }
        setStatus('uplink in progress...', 'pending');
        const note = { date: getDate(), body };
        if (imageUrl) note.image = imageUrl;
        if (musicEmbed) note.music = musicEmbed;
        cachedNotes.unshift(note);
        noteAdded = true;
        updateStats();
        renderNotes();
        document.getElementById('body').value = '';
        document.getElementById('musicInput').value = '';
        clearImagePicker();
        await commitNotes(`add note — ${getDate()}`);
        setStatus('uplink confirmed', 'success');
      } catch (e) {
        if (noteAdded) { cachedNotes.shift(); updateStats(); renderNotes(); }
        setStatus(e.message, 'error');
      } finally {
        btn.disabled = false;
      }
    }

    // ── delete ──
    async function deleteNote(i) {
      if (!confirm('delete this note?')) return;
      const removed = cachedNotes.splice(i, 1)[0];
      updateStats();
      renderNotes();
      setStatus('purging record...', 'pending');
      try {
        await commitNotes(`delete note — ${getDate()}`);
        setStatus('record purged', 'success');
      } catch (e) {
        cachedNotes.splice(i, 0, removed); // rollback
        updateStats();
        renderNotes();
        setStatus(e.message, 'error');
      }
    }

    // ── edit ──
    function startEdit(i) {
      toggleMenu(i); // close the menu
      const bodyEl = document.getElementById(`body-${i}`);
      const original = cachedNotes[i].body;
      bodyEl.innerHTML = `
        <textarea class="edit-textarea" id="edit-input-${i}">${original}</textarea>
        <div class="edit-actions">
          <button class="edit-save"   onclick="saveEdit(${i})">[ save ]</button>
          <button class="edit-cancel" onclick="renderNotes()">[ cancel ]</button>
        </div>
      `;
      document.getElementById(`edit-input-${i}`).focus();
    }

    async function saveEdit(i) {
      const newBody = document.getElementById(`edit-input-${i}`)?.value.trim();
      if (!newBody) return setStatus('note body is empty', 'error');
      const old = cachedNotes[i].body;
      cachedNotes[i].body = newBody;
      renderNotes();
      setStatus('patching record...', 'pending');
      try {
        await commitNotes(`edit note — ${getDate()}`);
        setStatus('record patched', 'success');
      } catch (e) {
        cachedNotes[i].body = old; // rollback
        renderNotes();
        setStatus(e.message, 'error');
      }
    }

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = `status ${type}`;
    }

    // ── star field ──
    (function () {
      const canvas = document.getElementById('starCanvas');
      const ctx    = canvas.getContext('2d');

      const STAR_COUNT   = 200;
      const SHOOT_EVERY  = 3200; // ms between shooting stars

      let stars = [];
      let shooters = [];
      let lastShoot = 0;

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', () => { resize(); buildStars(); });

      function rand(min, max) { return min + Math.random() * (max - min); }

      function buildStars() {
        stars = [];
        for (let i = 0; i < STAR_COUNT; i++) {
          stars.push({
            x:      rand(0, canvas.width),
            y:      rand(0, canvas.height),
            r:      rand(0.3, 1.4),
            base:   rand(0.2, 0.75),   // base opacity
            speed:  rand(0.4, 1.6),    // twinkle speed
            offset: rand(0, Math.PI * 2),
            cyan:   Math.random() < 0.18, // ~18% cyan, rest white
          });
        }
      }
      buildStars();

      function spawnShooter() {
        const startX = rand(canvas.width * 0.1, canvas.width * 0.9);
        const startY = rand(0, canvas.height * 0.4);
        shooters.push({
          x: startX, y: startY,
          len: rand(90, 160),
          speed: rand(7, 13),
          angle: rand(25, 40) * Math.PI / 180, // downward-right
          life: 1,
          decay: rand(0.018, 0.028),
        });
      }

      let last = 0;
      function draw(ts) {
        requestAnimationFrame(draw);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // twinkling stars
        const t = ts / 1000;
        for (const s of stars) {
          const osc = Math.sin(t * s.speed + s.offset);
          const alpha = Math.max(0, s.base + osc * 0.25);
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = s.cyan
            ? `rgba(0,200,255,${alpha})`
            : `rgba(220,235,255,${alpha})`;
          ctx.fill();
        }

        // spawn shooting star
        if (ts - lastShoot > SHOOT_EVERY) {
          spawnShooter();
          lastShoot = ts;
        }

        // draw & update shooting stars
        shooters = shooters.filter(s => s.life > 0);
        for (const s of shooters) {
          const tx = s.x + Math.cos(s.angle) * s.len;
          const ty = s.y + Math.sin(s.angle) * s.len;
          const grad = ctx.createLinearGradient(s.x, s.y, tx, ty);
          grad.addColorStop(0, `rgba(255,255,255,0)`);
          grad.addColorStop(0.6, `rgba(200,235,255,${s.life * 0.7})`);
          grad.addColorStop(1, `rgba(255,255,255,${s.life})`);
          ctx.beginPath();
          ctx.moveTo(s.x, s.y);
          ctx.lineTo(tx, ty);
          ctx.strokeStyle = grad;
          ctx.lineWidth = 1.2;
          ctx.stroke();

          s.x += Math.cos(s.angle) * s.speed;
          s.y += Math.sin(s.angle) * s.speed;
          s.life -= s.decay;
        }
      }
      requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
